<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Growth - Skill Path</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #e8e2dc;
        color: #0b2d1f;
    }

    .container {
        padding: 40px 60px;
        min-height: 100vh;
    }

    h1 {
        font-size: 42px;
        margin-bottom: 20px;
        color: #0b2d1f;
    }

    .top-bar {
        display: flex;
        gap: 15px;
        margin-bottom: 40px;
    }

    .pill {
        background: #0b2d1f;
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        font-size: 14px;
    }

    .timeline {
        position: relative;
        margin-top: 40px;
        padding-left: 50%;
        min-height: calc(100vh - 150px);
    }

    .timeline::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        width: 6px;
        height: 100vh;
        background: #2f6d4f;
        transform: translateX(-50%);
        bottom: 0;
    }

    .timeline::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        width: 26px;
        height: 26px;
        background: #2f6d4f;
        border: 4px solid #2f6d4f;
        border-radius: 50%;
        transform: translate(-50%, -50%);
    }

    .item {
        position: relative;
        width: 45%;
        margin: 40px 0;
    }

    .left {
        left: -50%;
        text-align: right;
    }

    .right {
        left: 5%;
        text-align: left;
    }

    .card {
        background: #0b2d1f;
        color: white;
        padding: 15px 20px;
        border-radius: 12px;
        display: inline-block;
        min-width: 220px;
        position: relative;
    }

    .card small {
        display: block;
        opacity: 0.7;
        font-size: 12px;
    }

    .dot {
        position: absolute;
        top: 50%;
        width: 22px;
        height: 22px;
        background: #e8e2dc;
        border-radius: 50%;
        border: 4px solid #2f6d4f;
        transform: translateY(-50%);
    }

    .left .dot {
        right: -35px;
    }

    .right .dot {
        left: -35px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
    }

    h1 {
        font-size: 42px;
        margin: 0;
    }

    .top-bar {
        display: flex;
        gap: 15px;
    }

    .dot {
        position: absolute;
        top: 50%;
        width: 26px;
        height: 26px;
        background: #e8e2dc;
        border-radius: 50%;
        border: 4px solid #2f6d4f;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: bold;
        color: transparent;
    }

    .completed .dot {
        background: #2f6d4f;
        color: white;
    }

    .completed .card {
        background: #1e4d36;
        opacity: 0.9;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>My Growth</h1>

        <div class="top-bar">
            <div class="pill">Path Progress&nbsp; 30%</div>
            <div class="pill">Select Path</div>
        </div>
    </div>

    <div class="timeline">

        <div class="item left completed">
            <div class="card">
                Course Introduction
                <small>Background of course and path</small>
            </div>
            <div class="dot">✓</div>
        </div>

        <div class="item right completed">
            <div class="card">Lesson 1</div>
            <div class="dot">✓</div>
        </div>

        <div class="item right completed">
            <div class="card">Practical Workshop 1</div>
            <div class="dot">✓</div>
        </div>

        <div class="item left">
            <div class="card">
                Chapter Project
                <small>Chapter 1 Requirement</small>
            </div>
            <div class="dot"></div>
        </div>

        <div class="item right">
            <div class="card">Lesson 2</div>
            <div class="dot"></div>
        </div>

        <div class="item right">
            <div class="card">Lesson 3</div>
            <div class="dot"></div>
        </div>

        <div class="item right">
            <div class="card">Practical Workshop 2</div>
            <div class="dot"></div>
        </div>

        <div class="item left">
            <div class="card">
                Chapter Project
                <small>Chapter 2 Requirement</small>
            </div>
            <div class="dot"></div>
        </div>

        <div class="item left">
            <div class="card">
                Chapter Project
                <small>Chapter 2 Requirement</small>
            </div>
            <div class="dot"></div>
        </div>
    </div>
</div>

</body>
</html>
